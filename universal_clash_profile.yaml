  - name: '其他地区'
    type: url-test
    include-all-providers: true
    filter: '(?i)^(?!.*(🇭🇰|HK|Hong\s*Kong|香港|🇹🇼|TW|Taiwan|台湾|台灣|🇰🇷|KR|South\s*Korea|Korea|韩国|🇯🇵|JP|Japan|日本|🇸🇬|SG|Singapore|新加坡|狮城|🇻🇳|VN|Vietnam|越南|🇹🇭|TH|Thailand|泰国|🇲🇾|MY|Malaysia|马来西亚|大马|🇮🇳|IN|India|印度|🇹🇷|TR|Turkey|土耳其|🇷🇺|RU|Russia|俄罗斯|🇦🇺|AU|Australia|澳大利亚|澳洲|🇩🇪|DE|Germany|德国|🇫🇷|FR|France|法国|🇳🇱|NL|Netherlands|荷兰|🇬🇧|UK|United\s*Kingdom|England|英国|🇨🇦|CA|Canada|加拿大|🇺🇸|US|USA|United\s*States|America|美国)).+'
