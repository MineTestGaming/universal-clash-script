proxy-providers:
  # 将 url 修改为机场订阅链接即可。如需多个机场，可继续追加。
  provider_1:
    type: http
    url: 'your_subscription_url'
    proxy: DIRECT
    interval: 3000
    size-limit: 0
    filter: '^(?!.*(请|剩余|套餐|流量|优惠|活动|到期|过期|网址)).*$'
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204
    override:
      additional-prefix: ''

rule-providers:
