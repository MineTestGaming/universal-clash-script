mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
find-process-mode: strict

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - geosite:private
    - geosite:connectivity-check
  nameserver:
    - https://doh.pub/dns-query
  fallback:
    - tls://8.8.4.4#PROXY
    - tls://1.1.1.1#PROXY
  fallback-filter:
    geoip: true
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  default-nameserver:
    - 223.5.5.5

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  mtu: 1500
  gso: true
  gso-max-size: 65536

proxy-groups:
  - name: '1️⃣ 首选'
    type: select
    proxies:
      - '🌍 全球'
      - '🇭🇰 香港节点'
      - '🇹🇼 台湾节点'
      - '🇯🇵 日本节点'
      - '🇸🇬 新加坡节点'
      - '🇺🇸 美国节点'
      - '🇰🇷 韩国节点'
      - '🇬🇧 英国节点'
      - '🇩🇪 德国节点'
      - '🇫🇷 法国节点'
      - '🇳🇱 荷兰节点'
      - '🇨🇦 加拿大节点'
      - '🇦🇺 澳大利亚节点'
      - '🇻🇳 越南节点'
      - '🇹🇭 泰国节点'
      - '🇲🇾 马来西亚节点'
      - '🇮🇳 印度节点'
      - '🇹🇷 土耳其节点'
      - '🇷🇺 俄罗斯节点'
      - '其他地区'
      - 'MANUAL'
      - 'DIRECT'

  - name: '2️⃣ 次选'
    type: select
    proxies:
      - '🌍 全球'
      - '🇭🇰 香港节点'
      - '🇹🇼 台湾节点'
      - '🇯🇵 日本节点'
      - '🇸🇬 新加坡节点'
      - '🇺🇸 美国节点'
      - '🇰🇷 韩国节点'
      - '🇬🇧 英国节点'
      - '🇩🇪 德国节点'
      - '🇫🇷 法国节点'
      - '🇳🇱 荷兰节点'
      - '🇨🇦 加拿大节点'
      - '🇦🇺 澳大利亚节点'
      - '🇻🇳 越南节点'
      - '🇹🇭 泰国节点'
      - '🇲🇾 马来西亚节点'
      - '🇮🇳 印度节点'
      - '🇹🇷 土耳其节点'
      - '🇷🇺 俄罗斯节点'
      - '其他地区'
      - 'MANUAL'
      - 'DIRECT'

  - name: 'PROXY'
    type: fallback
    proxies:
      - '1️⃣ 首选'
      - '2️⃣ 次选'
    url: https://www.gstatic.com/generate_204
    interval: 30

  - name: 'DEFAULT'
    type: select
    proxies:
      - PROXY
      - DIRECT

  - name: 'MANUAL'
    type: select
    include-all-providers: true

  - name: 'ADS'
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: '🌍 全球'
    type: url-test
    include-all-providers: true
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 400
    lazy: false

  - name: '🇭🇰 香港节点'
    type: url-test
    include-all-providers: true
    filter: '(?i)🇭🇰|(?<![A-Za-z])HK(?![A-Za-z])|Hong\s*Kong|香港'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 500

  - name: '🇹🇼 台湾节点'
    type: url-test
    include-all-providers: true
    filter: '(?i)🇹🇼|(?<![A-Za-z])TW(?![A-Za-z])|Taiwan|台湾|台灣'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 500
