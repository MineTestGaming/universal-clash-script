proxy-providers:
  # 将 url 修改为机场订阅链接即可。如需多个机场，可继续追加。
  provider_1:
    type: http
    url: 'your_subscription_url'
    proxy: DIRECT
    interval: 3000
    size-limit: 0
    filter: '^(?!.*(请|剩余|套餐|流量|优惠|活动|到期|过期|网址)).*$'
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204
    override:
      additional-prefix: ''

rule-providers:
  # 自定义代理名单
  custom_black_list:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,argotunnel.com

  # 自定义直连名单
  custom_white_list:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,xn--ngstr-lra8j.com
      - DOMAIN-SUFFIX,srv.nintendo.net
      - DOMAIN-SUFFIX,d4c.nintendo.net
      - DOMAIN-SUFFIX,cdn.nintendo.net
      - PROCESS-NAME,WinStore.App.exe
      - PROCESS-NAME,SystemSettings.exe
      - DOMAIN-SUFFIX,ppzhilian.com
      - DOMAIN-SUFFIX,gh-proxy.org
      - DOMAIN-SUFFIX,gh-proxy.com

  # 自定义屏蔽名单
  custom_block_list:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,firebaseremoteconfigrealtime.googleapis.com
      - DOMAIN-SUFFIX,firebaseremoteconfig.googleapis.com
      - DOMAIN-SUFFIX,amplesound.net
      - IP-CIDR,159.203.227.87/32,no-resolve
      - IP-CIDR,50.116.38.191/32,no-resolve

  # 地区分流规则
  region_hk:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,tvb.com
      - DOMAIN-SUFFIX,viu.tv
      - DOMAIN-SUFFIX,lihkg.com
      - DOMAIN-SUFFIX,hkgolden.com

  region_tw:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,ani.gamer.com.tw
      - DOMAIN-SUFFIX,litv.tv
      - DOMAIN-SUFFIX,ptt.cc
      - DOMAIN-SUFFIX,dcard.tw
      - DOMAIN-SUFFIX,mobile01.com
      - DOMAIN-SUFFIX,gamer.com.tw

  region_jp:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,dmm.co.jp
      - DOMAIN-SUFFIX,abema.tv
      - DOMAIN-SUFFIX,nicovideo.jp

  region_uk:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,bbc.co.uk

  region_us:
    type: inline
    behavior: classical
    payload:
      - DOMAIN-SUFFIX,max.com
      - DOMAIN-SUFFIX,hulu.com
      - DOMAIN-SUFFIX,disneyplus.com
      - DOMAIN-SUFFIX,tv.youtube.com
      - DOMAIN-SUFFIX,cdn.usefathom.com
      - DOMAIN-SUFFIX,claude.ai
      - DOMAIN-SUFFIX,anthropic.com
      - DOMAIN-SUFFIX,claudeusercontent.com

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
find-process-mode: strict

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - geosite:private
    - geosite:connectivity-check
  # 说明：这里 DNS 的目标是尽快匹配 GEOIP,CN。
  # 因此优先使用国内 DNS，以国外 DNS 作为兜底，nameserver 和 fallback 会并发请求。
  # 走到 GEOIP 之前，外网站点本身已经会被导向代理；用 nameserver-policy 二次分流收益不大。
  nameserver:
    - https://doh.pub/dns-query
  fallback:
    - tls://8.8.4.4#PROXY
    - tls://1.1.1.1#PROXY
  # 如果国内 DNS 返回的结果不是 CN IP，则采用 fallback 结果。
  fallback-filter:
    geoip: true
  # 解析代理服务器域名。
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  # 解析 DNS 服务器域名。
  default-nameserver:
    - 223.5.5.5

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  # MTU 过高，会导致 WSL mirrored 模式异常
  mtu: 1500
  gso: true
  gso-max-size: 65536

proxy-groups:
  - name: '1️⃣ 首选'
    type: select
    proxies:
      - '🌍 全球'
      - '🇭🇰 香港'
      - '🇹🇼 台湾'
      - '🇯🇵 日本'
      - '🇸🇬 新加坡'
      - '🇺🇸 美国'
      - '🇰🇷 韩国'
      - '🇬🇧 英国'
      - '🇩🇪 德国'
      - '🇫🇷 法国'
      - '🇳🇱 荷兰'
      - '🇨🇦 加拿大'
      - '🇦🇺 澳大利亚'
      - '🇻🇳 越南'
      - '🇹🇭 泰国'
      - '🇲🇾 马来西亚'
      - '🇮🇳 印度'
      - '🇹🇷 土耳其'
      - '🇷🇺 俄罗斯'
      - '其他地区'
      - 'MANUAL'
      - 'DIRECT'

  - name: '2️⃣ 次选'
    type: select
    proxies:
      - '🌍 全球'
      - '🇭🇰 香港'
      - '🇹🇼 台湾'
      - '🇯🇵 日本'
      - '🇸🇬 新加坡'
      - '🇺🇸 美国'
      - '🇰🇷 韩国'
      - '🇬🇧 英国'
      - '🇩🇪 德国'
      - '🇫🇷 法国'
      - '🇳🇱 荷兰'
      - '🇨🇦 加拿大'
      - '🇦🇺 澳大利亚'
      - '🇻🇳 越南'
      - '🇹🇭 泰国'
      - '🇲🇾 马来西亚'
      - '🇮🇳 印度'
      - '🇹🇷 土耳其'
      - '🇷🇺 俄罗斯'
      - '其他地区'
      - 'MANUAL'
      - 'DIRECT'

  - name: 'PROXY'
    type: fallback
    # 主出口：在首选 / 次选之间自动回退。
    proxies:
      - '1️⃣ 首选'
      - '2️⃣ 次选'
    url: https://www.gstatic.com/generate_204
    interval: 30

  - name: 'DEFAULT'
    type: select
    # 默认出口：处理所有未命中规则的流量。
    proxies:
      - PROXY
      - DIRECT

  - name: 'MANUAL'
    type: select
    # 手动节点池：直接暴露所有 provider 节点，便于临时手选单节点。
    include-all-providers: true

  - name: 'ADS'
    type: select
    # 广告出口：默认 REJECT，也可手动切到 DIRECT。
    proxies:
      - REJECT
      - DIRECT

  - name: '🌍 全球'
    type: url-test
    include-all-providers: true
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 400
    lazy: false

  - name: '🇭🇰 香港'
    type: url-test
    include-all-providers: true
    filter: '(?i)🇭🇰|(?<![A-Za-z])HK(?![A-Za-z])|Hong\s*Kong|香港'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 500

  - name: '🇹🇼 台湾'
    type: url-test
    include-all-providers: true
    filter: '(?i)🇹🇼|(?<![A-Za-z])TW(?![A-Za-z])|Taiwan|台湾|台灣'
